name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel an older CI run on the same ref when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    # Self-hosted to preserve free GitHub-hosted minutes.
    runs-on: [self-hosted, beast-unit]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/Shield.Web/package-lock.json

      - name: Restore .NET
        run: dotnet restore Shield.sln

      # Surface vulnerable transitive deps from the NuGet graph. NU1903 also fires at
      # build time via TreatWarningsAsErrors, but listing them here makes the CI log
      # the canonical place to grep for advisory IDs.
      - name: Audit .NET deps
        run: dotnet list Shield.sln package --vulnerable --include-transitive

      - name: Build .NET
        run: dotnet build Shield.sln -c Release --no-restore

      - name: Test .NET
        run: >
          dotnet test Shield.sln -c Release --no-build
          --logger trx --results-directory ./test-results

      - name: Install SPA deps
        working-directory: src/Shield.Web
        run: npm ci

      # Fail the build on any high-or-critical advisory in the SPA's npm tree. Moderate
      # findings are surfaced in the log but don't block — too many noisy false positives
      # in the transitive devDep set, and they'd be fixed by the next npm-update sweep.
      - name: Audit SPA deps
        working-directory: src/Shield.Web
        run: npm run audit

      - name: Build SPA
        working-directory: src/Shield.Web
        run: npm run build

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results
