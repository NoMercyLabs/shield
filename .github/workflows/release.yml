name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: notes
        run: |
          NOTES_FILE="$(mktemp)"
          if [ -f CHANGELOG.md ]; then
            awk -v v="${{ steps.ver.outputs.version }}" '
              BEGIN { found=0 }
              /^## / {
                if (found) exit
                if (index($0, v) > 0) { found=1; print; next }
              }
              found { print }
            ' CHANGELOG.md > "$NOTES_FILE"
          fi
          if [ ! -s "$NOTES_FILE" ]; then
            echo "Shield ${{ steps.ver.outputs.tag }} — see commit history for changes." > "$NOTES_FILE"
          fi
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/nomercylabs/shield:${{ steps.ver.outputs.version }}
            ghcr.io/nomercylabs/shield:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/nomercylabs/shield:${{ steps.ver.outputs.version }}
          format: spdx-json
          output-file: shield-${{ steps.ver.outputs.version }}.sbom.spdx.json
          upload-artifact: true
          upload-release-assets: false

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Shield ${{ steps.ver.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            shield-${{ steps.ver.outputs.version }}.sbom.spdx.json
