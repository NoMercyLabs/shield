# fail2ban action: relay ban / unban events to Shield's correlation log.
#
# Usage:
#   1. Mount this file into the fail2ban container at /etc/fail2ban/action.d/shield.conf
#      (e.g. add the directory to a bind mount, or `docker cp` for ad-hoc tests).
#   2. Generate an ingest key on the Shield host:
#        openssl rand -base64 32
#   3. Export it to BOTH sides:
#        - Shield: Shield__Security__Fail2BanIngestKey=<key>
#        - fail2ban: replace <YOUR_KEY> below.
#   4. Reference the action from your jail's action chain, e.g.:
#        [sshd]
#        enabled = true
#        action  = %(action_)s
#                  shield
#   5. Verify by tailing Shield's log + inducing a ban — the event should appear in
#      the Security → Timeline view within seconds.
#
# Replace <SHIELD_BASE> with your Shield instance's reachable URL (e.g. https://shield.example.com).
# Replace <YOUR_KEY> with the openssl-generated secret above.

[Definition]

# Notify Shield when fail2ban bans an IP.
actionban   = curl -sS --max-time 5 \
                   -H "Content-Type: application/json" \
                   -H "X-Shield-Fail2Ban-Key: <YOUR_KEY>" \
                   -X POST "<SHIELD_BASE>/api/security/fail2ban/event" \
                   -d '{"host":"<host>","jail":"<name>","eventType":"ban","ip":"<ip>","at":"<time>","matches":<matches>}'

# Notify Shield when fail2ban lifts a ban (timeout expiry or manual unban).
actionunban = curl -sS --max-time 5 \
                   -H "Content-Type: application/json" \
                   -H "X-Shield-Fail2Ban-Key: <YOUR_KEY>" \
                   -X POST "<SHIELD_BASE>/api/security/fail2ban/event" \
                   -d '{"host":"<host>","jail":"<name>","eventType":"unban","ip":"<ip>","at":"<time>"}'

# actionstart / actionstop / actioncheck are intentionally no-ops — the relay is event-driven,
# not stateful. Failures in actionban (network blip, Shield down) MUST NOT block fail2ban's
# real enforcement; the --max-time keeps curl from hanging the fail2ban worker.

actionstart =
actionstop  =
actioncheck =

[Init]
# Hostname tag sent in the payload's `host` field. Override per-jail with `host = <value>` if a
# single fail2ban container manages jails for multiple logical hosts (rare).
host = %(name)s
