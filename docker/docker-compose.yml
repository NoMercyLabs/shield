# Shield — production reference Compose.
#
# Topology: cloudflared runs on the Proxmox / Docker HOST and forwards a Cloudflare Tunnel
# at http://127.0.0.1:8842. Shield therefore binds ONLY to the loopback interface on the
# host — port 8842 is unreachable from any other machine on the LAN or the public internet.
#
# Need to expose Shield without installing cloudflared on the host? Layer the sidecar:
#   docker compose -f docker-compose.yml -f docker-compose.cloudflared.yml up -d
# That overlay drops the loopback bind and runs cloudflared in the compose network.
#
# Secrets come from .env (next to this file). Copy .env.example -> .env and fill it in.

services:
  shield:
    image: ghcr.io/nomercylabs/shield:latest
    # Building from source (contributors only — requires cloning the repo):
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile
    container_name: shield
    restart: unless-stopped
    ports:
      # 127.0.0.1 ONLY — cloudflared on the host reaches us via loopback. Do NOT change
      # to 0.0.0.0 unless you understand you're exposing Shield directly to the LAN.
      - "127.0.0.1:8842:8842"
    volumes:
      # One volume holds the SQLite DBs AND the DataProtection keyring under /app/data/keys.
      # Back this up. Losing /app/data/keys invalidates every encrypted secret (OAuth
      # tokens, Discord webhook URLs, OIDC client secrets) AND every active session cookie.
      - shield-data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8842/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # mem_limit / mem_reservation are the v2 Compose shorthand that work without Swarm.
    # Shield's resident set is small (~150 MB steady-state on a busy multi-source deploy).
    # 512 MB is a generous hard cap that still triggers OOM before the host swaps itself
    # to death; 128 MB reservation guarantees the scheduler keeps room for a healthy boot.
    mem_limit: 512m
    mem_reservation: 128m
    logging:
      driver: json-file
      options:
        # Without this docker logs grow unbounded and eat the host disk.
        max-size: "10m"
        max-file: "3"

volumes:
  shield-data:
